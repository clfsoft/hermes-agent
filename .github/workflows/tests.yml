name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra web --extra pty

      - name: Run fork-safe tests
        run: |
          uv run pytest \
            tests/hermes_cli/test_install_baseline.py \
            tests/hermes_cli/test_main_entry_integrity.py \
            tests/hermes_cli/test_memory_doctor.py \
            tests/tools/test_memory_tool.py \
            tests/gateway/test_maintenance.py \
            tests/hermes_cli/test_web_server.py \
            tests/cli/test_quick_commands.py \
            tests/e2e/test_platform_commands.py \
            -q --tb=short
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
